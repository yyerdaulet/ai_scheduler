<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Scheduler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: #f5f5f4;
    color: #1c1c1c;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
  }
  .logo { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: #888; }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .panel {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 16px;
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 7px;
  }

  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #f5f5f4;
    border: 1px solid #e5e5e5;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
  }
  .chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }
  .chip button:hover { color: #333; }

  .inline-add { display: flex; gap: 6px; margin-top: 6px; }
  input, select {
    height: 32px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    color: #1c1c1c;
    background: #fff;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus { border-color: #aaa; }
  .inline-add input { flex: 1; }

  button.btn-add {
    height: 32px;
    padding: 0 12px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    color: #555;
  }
  button.btn-add:hover { background: #f5f5f4; }

  /* links */
  .links-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .link-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    background: #f9f9f8;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 5px 10px;
  }
  .link-row .t { color: #185FA5; font-weight: 500; }
  .link-row .s { color: #3C3489; font-weight: 500; }
  .link-row .g { color: #3B6D11; font-weight: 500; }
  .link-row .h { color: #854F0B; font-weight: 500; }
  .link-row .sep { color: #ccc; }
  .link-row button {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 14px;
  }
  .link-row button:hover { color: #555; }

  .link-form { display: grid; grid-template-columns: 1fr 1fr 1fr 44px 32px; gap: 5px; }
  .link-form input[type=number] { padding: 0 6px; text-align: center; }

  .links-total { font-size: 11px; color: #aaa; margin-top: 6px; }

  /* exceptions */
  .exc-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
  .exc-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #666;
    background: #f9f9f8;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 5px 10px;
  }
  .exc-item button { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; }
  .exc-item button:hover { color: #555; }

  /* generate button */
  .btn-generate {
    width: 100%;
    padding: 10px;
    background: #1c1c1c;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-generate:hover { background: #333; }
  .btn-generate:disabled { background: #aaa; cursor: not-allowed; }

  .error { font-size: 12px; color: #c00; margin-top: 8px; }

  /* result panel */
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .result-title { font-size: 13px; font-weight: 500; }
  .btn-reasoning {
    font-size: 11px;
    color: #888;
    background: none;
    border: 1px solid #e5e5e5;
    border-radius: 5px;
    padding: 3px 9px;
    cursor: pointer;
  }
  .btn-reasoning:hover { background: #f5f5f4; }

  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: #bbb;
    font-size: 13px;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    flex-direction: column;
    gap: 10px;
    color: #888;
    font-size: 13px;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid #e5e5e5;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* schedule table */
  .day-block { margin-bottom: 20px; }
  .day-label {
    font-size: 11px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 11px;
    font-weight: 400;
    color: #aaa;
    padding: 0 10px 6px 0;
    border-bottom: 1px solid #e5e5e5;
  }
  td {
    padding: 7px 10px 7px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  .td-time { color: #aaa; font-size: 12px; white-space: nowrap; width: 80px; }
  .pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .pill-t { background: #E6F1FB; color: #0C447C; }
  .pill-g { background: #EAF3DE; color: #3B6D11; }
  .pill-r { background: #FAEEDA; color: #854F0B; }
  .pill-s { background: #EEEDFE; color: #3C3489; }

  /* reasoning */
  .reasoning-box {
    margin-bottom: 16px;
    background: #f9f9f8;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 12px 14px;
  }
  .reasoning-box .r-title { font-size: 11px; font-weight: 500; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .r-step { font-size: 12px; color: #555; line-height: 1.7; display: flex; gap: 7px; }
  .r-step::before { content: '✓'; color: #3B6D11; flex-shrink: 0; }

  .warnings-box {
    margin-bottom: 14px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    color: #92400e;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <span class="logo">AI Scheduler</span>
  <span class="header-sub">Пн – Сб · 08:00 – 18:50</span>
</header>

<div class="layout">
  <!-- LEFT: input -->
  <div class="panel">

    <!-- Teachers -->
    <div class="field">
      <label>Преподаватели</label>
      <div class="chip-row" id="teachers-chips"></div>
      <div class="inline-add">
        <input id="teacher-inp" placeholder="Имя преподавателя" onkeydown="if(event.key==='Enter') addChip('teacher')">
        <button class="btn-add" onclick="addChip('teacher')">+</button>
      </div>
    </div>

    <!-- Groups -->
    <div class="field">
      <label>Группы</label>
      <div class="chip-row" id="groups-chips"></div>
      <div class="inline-add">
        <input id="group-inp" placeholder="Название группы" onkeydown="if(event.key==='Enter') addChip('group')">
        <button class="btn-add" onclick="addChip('group')">+</button>
      </div>
    </div>

    <!-- Rooms -->
    <div class="field">
      <label>Кабинеты</label>
      <div class="chip-row" id="rooms-chips"></div>
      <div class="inline-add">
        <input id="room-inp" placeholder="Номер / название" onkeydown="if(event.key==='Enter') addChip('room')">
        <button class="btn-add" onclick="addChip('room')">+</button>
      </div>
    </div>

    <!-- Links -->
    <div class="field">
      <label>Связки <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb;font-size:10px">препод · предмет · группа · ч/блок</span></label>
      <div class="links-list" id="links-list"></div>
      <div class="link-form">
        <select id="link-teacher"><option value="">Препод</option></select>
        <input id="link-subject" placeholder="Предмет" onkeydown="if(event.key==='Enter') addLink()">
        <select id="link-group"><option value="">Группа</option></select>
        <input id="link-hours" type="number" min="1" max="8" value="2">
        <button class="btn-add" onclick="addLink()">+</button>
      </div>
      <div class="links-total" id="links-total"></div>
    </div>

    <!-- Exceptions -->
    <div class="field">
      <label>Исключения</label>
      <div class="exc-list" id="exc-list"></div>
      <div class="inline-add">
        <input id="exc-inp" placeholder="напр. Алиев — суббота" onkeydown="if(event.key==='Enter') addException()">
        <button class="btn-add" onclick="addException()">+</button>
      </div>
    </div>

    <button class="btn-generate" id="gen-btn" onclick="generate()">Создать расписание</button>
    <div class="error" id="error-msg"></div>
  </div>

  <!-- RIGHT: result -->
  <div class="panel">
    <div class="result-header">
      <span class="result-title" id="result-title">Расписание</span>
      <button class="btn-reasoning" id="btn-reasoning" onclick="toggleReasoning()" style="display:none">Логика агента</button>
    </div>
    <div id="result-area">
      <div class="empty">Заполните данные слева и нажмите «Создать расписание»</div>
    </div>
  </div>
</div>

<script>
const state = { teachers: [], groups: [], rooms: [], links: [], exceptions: [] };
let reasoningData = [];
let showReasoning = false;
let scheduleData = [];

function addChip(type) {
  const ids = { teacher: 'teacher-inp', group: 'group-inp', room: 'room-inp' };
  const keys = { teacher: 'teachers', group: 'groups', room: 'rooms' };
  const inp = document.getElementById(ids[type]);
  const val = inp.value.trim();
  if (!val || state[keys[type]].includes(val)) { inp.value = ''; return; }
  state[keys[type]].push(val);
  inp.value = '';
  renderChips(type);
  if (type === 'teacher') updateLinkSelects();
  if (type === 'group') updateLinkSelects();
}

function removeChip(type, val) {
  const keys = { teacher: 'teachers', group: 'groups', room: 'rooms' };
  state[keys[type]] = state[keys[type]].filter(x => x !== val);
  renderChips(type);
  if (type === 'teacher' || type === 'group') updateLinkSelects();
}

function renderChips(type) {
  const ids = { teacher: 'teachers-chips', group: 'groups-chips', room: 'rooms-chips' };
  const keys = { teacher: 'teachers', group: 'groups', room: 'rooms' };
  document.getElementById(ids[type]).innerHTML = state[keys[type]].map(v =>
    `<span class="chip">${v}<button onclick="removeChip('${type}','${v}')">×</button></span>`
  ).join('');
}

function updateLinkSelects() {
  const ts = document.getElementById('link-teacher');
  const gs = document.getElementById('link-group');
  const tv = ts.value, gv = gs.value;
  ts.innerHTML = '<option value="">Препод</option>' + state.teachers.map(t => `<option${t===tv?' selected':''}>${t}</option>`).join('');
  gs.innerHTML = '<option value="">Группа</option>' + state.groups.map(g => `<option${g===gv?' selected':''}>${g}</option>`).join('');
}

function addLink() {
  const teacher = document.getElementById('link-teacher').value;
  const subject = document.getElementById('link-subject').value.trim();
  const group = document.getElementById('link-group').value;
  const hours = parseInt(document.getElementById('link-hours').value) || 2;
  if (!teacher || !subject || !group) return;
  state.links.push({ teacher, subject, group, hours });
  document.getElementById('link-subject').value = '';
  renderLinks();
}

function removeLink(i) {
  state.links.splice(i, 1);
  renderLinks();
}

function renderLinks() {
  document.getElementById('links-list').innerHTML = state.links.map((l, i) =>
    `<div class="link-row">
      <span class="t">${l.teacher}</span><span class="sep">·</span>
      <span class="s">${l.subject}</span><span class="sep">·</span>
      <span class="g">${l.group}</span><span class="sep">·</span>
      <span class="h">${l.hours}ч</span>
      <button onclick="removeLink(${i})">×</button>
    </div>`
  ).join('');
  const total = state.links.reduce((s, l) => s + l.hours, 0);
  document.getElementById('links-total').textContent = state.links.length
    ? `${state.links.length} связок · ${total} ч/нед` : '';
}

function addException() {
  const val = document.getElementById('exc-inp').value.trim();
  if (!val) return;
  state.exceptions.push(val);
  document.getElementById('exc-inp').value = '';
  renderExceptions();
}

function removeException(i) {
  state.exceptions.splice(i, 1);
  renderExceptions();
}

function renderExceptions() {
  document.getElementById('exc-list').innerHTML = state.exceptions.map((e, i) =>
    `<div class="exc-item">${e}<button onclick="removeException(${i})">×</button></div>`
  ).join('');
}

function toggleReasoning() {
  showReasoning = !showReasoning;
  document.getElementById('btn-reasoning').textContent = showReasoning ? 'Расписание' : 'Логика агента';
  renderResult();
}

function renderResult() {
  const area = document.getElementById('result-area');
  if (showReasoning) {
    area.innerHTML =
      `<div class="reasoning-box">
        <div class="r-title">Логика агента</div>
        ${reasoningData.map(s => `<div class="r-step">${s}</div>`).join('')}
      </div>`;
    return;
  }

  let html = '';

  if (scheduleData.warnings && scheduleData.warnings.length) {
    html += `<div class="warnings-box">` + scheduleData.warnings.join('<br>') + `</div>`;
  }

  const days = scheduleData.schedule || [];
  if (!days.length) { area.innerHTML = '<div class="empty">Расписание пусто</div>'; return; }

  days.forEach(day => {
    if (!day.slots || !day.slots.length) return;
    html += `<div class="day-block">
      <div class="day-label">${day.day}</div>
      <table>
        <thead><tr>
          <th>Время</th><th>Преподаватель</th><th>Предмет</th><th>Группа</th><th>Кабинет</th>
        </tr></thead>
        <tbody>`;
    day.slots.forEach(s => {
      const time = s.time_end ? `${s.time_start} – ${s.time_end}` : s.time_start;
      html += `<tr>
        <td class="td-time">${time}</td>
        <td><span class="pill pill-t">${s.teacher}</span></td>
        <td><span class="pill pill-s">${s.subject}</span></td>
        <td><span class="pill pill-g">${s.group}</span></td>
        <td><span class="pill pill-r">${s.room}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  area.innerHTML = html;
}

async function generate() {
  const { teachers, groups, rooms, links, exceptions } = state;
  const err = document.getElementById('error-msg');
  if (!teachers.length || !groups.length || !rooms.length || !links.length) {
    err.textContent = 'Заполните преподавателей, группы, кабинеты и хотя бы одну связку';
    return;
  }
  err.textContent = '';

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Агент работает...';
  document.getElementById('result-area').innerHTML = `<div class="loading"><div class="spinner"></div>Составляем расписание...</div>`;
  document.getElementById('btn-reasoning').style.display = 'none';
  document.getElementById('result-title').textContent = 'Расписание';
  showReasoning = false;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teachers, groups, rooms, links, exceptions }),
    });
    const data = await res.json();
    scheduleData = data;
    reasoningData = data.reasoning || [];
    renderResult();
    document.getElementById('result-title').textContent = 'Расписание';
    if (reasoningData.length) document.getElementById('btn-reasoning').style.display = '';
  } catch (e) {
    document.getElementById('result-area').innerHTML = `<div class="empty" style="color:#c00">Ошибка соединения с сервером</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Пересоздать расписание';
}
</script>
</body>
</html>
